<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ultimate Karaoke - Cardápio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #0f172a; color: #f8fafc; font-family: system-ui, -apple-system, sans-serif; }
    .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
  </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">
  
  <header class="glass p-4 border-b border-slate-700 sticky top-0 z-10">
    <h1 class="text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 text-center">
      Ultimate Karaoke
    </h1>
    <div class="mt-4 flex bg-slate-800 rounded-full p-1 border border-slate-700">
      <button id="tab-search" class="flex-1 py-2 text-sm font-semibold rounded-full bg-blue-600 text-white transition-colors" onclick="switchTab('search')">
        🔍 Buscar Músicas
      </button>
      <button id="tab-queue" class="flex-1 py-2 text-sm font-semibold rounded-full text-slate-400 hover:text-white transition-colors" onclick="switchTab('queue')">
        🎤 Ver Fila (<span id="queue-count">0</span>)
      </button>
    </div>
  </header>

  <main class="flex-1 overflow-y-auto p-4" id="main-content">
    <!-- SEARCH TAB -->
    <div id="view-search" class="space-y-4">
      <div class="sticky top-0 glass z-10 pb-4">
        <input type="text" id="search-input" placeholder="Digite o nome da música ou artista..." 
          class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
      </div>
      
      <div id="search-results" class="space-y-2 pb-20">
        <div class="text-center text-slate-500 mt-10 italic">Digite algo para buscar...</div>
      </div>
    </div>

    <!-- QUEUE TAB -->
    <div id="view-queue" class="hidden space-y-3 pb-20">
      <h2 class="text-lg font-bold text-slate-300 mb-4">Próximos Cantores</h2>
      <div id="queue-list" class="space-y-2">
        <div class="text-center text-slate-500 italic">A fila está vazia.</div>
      </div>
    </div>
  </main>

  <!-- NOTIFICATION TOAST -->
  <div id="toast" class="fixed bottom-4 left-1/2 transform -translate-x-1/2 bg-emerald-600 text-white px-6 py-3 rounded-full font-bold shadow-lg shadow-emerald-900/50 transition-all duration-300 translate-y-20 opacity-0 pointer-events-none z-50">
    Sucesso!
  </div>

  <!-- MODAL CANTOR -->
  <div id="singer-modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
    <div class="bg-slate-800 border border-slate-700 rounded-2xl p-6 w-full max-w-sm shadow-2xl transform scale-95 transition-transform duration-200" id="singer-modal-content">
      <h3 class="text-xl font-bold mb-2">Quem vai cantar?</h3>
      <p id="modal-song-title" class="text-sm text-blue-400 mb-4 truncate"></p>
      <input type="text" id="singer-input" placeholder="Seu nome" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-purple-500 mb-6">
      <div class="flex gap-3">
        <button onclick="closeModal()" class="flex-1 py-3 bg-slate-700 hover:bg-slate-600 rounded-lg font-semibold transition-colors">Cancelar</button>
        <button id="btn-enqueue" class="flex-1 py-3 bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 rounded-lg font-bold shadow-lg transition-all">Adicionar</button>
      </div>
    </div>
  </div>

  <script>
    let ws;
    let selectedSongId = null;
    let searchTimeout = null;

    function initWebSocket() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = `${protocol}//${window.location.host}/ws`;
      
      ws = new WebSocket(wsUrl);
      
      ws.onopen = () => {
        console.log('Connected to Karaoke Server');
        ws.send(JSON.stringify({ type: 'get_queue' }));
      };
      
      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === 'search_results') {
          renderSearchResults(msg.results);
        } else if (msg.type === 'queue_state') {
          renderQueue(msg.queue);
        } else if (msg.type === 'notification') {
          showToast(msg.message);
        }
      };
      
      ws.onclose = () => {
        console.log('Disconnected. Reconnecting in 3s...');
        setTimeout(initWebSocket, 3000);
      };
    }

    // Tabs
    function switchTab(tab) {
      document.getElementById('view-search').classList.toggle('hidden', tab !== 'search');
      document.getElementById('view-queue').classList.toggle('hidden', tab !== 'queue');
      
      const btnSearch = document.getElementById('tab-search');
      const btnQueue = document.getElementById('tab-queue');
      
      if (tab === 'search') {
        btnSearch.className = 'flex-1 py-2 text-sm font-semibold rounded-full bg-blue-600 text-white transition-colors';
        btnQueue.className = 'flex-1 py-2 text-sm font-semibold rounded-full text-slate-400 hover:text-white transition-colors';
      } else {
        btnQueue.className = 'flex-1 py-2 text-sm font-semibold rounded-full bg-blue-600 text-white transition-colors';
        btnSearch.className = 'flex-1 py-2 text-sm font-semibold rounded-full text-slate-400 hover:text-white transition-colors';
        if(ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'get_queue' }));
        }
      }
    }

    // Search
    document.getElementById('search-input').addEventListener('input', (e) => {
      clearTimeout(searchTimeout);
      const query = e.target.value.trim();
      
      if (query.length === 0) {
        document.getElementById('search-results').innerHTML = '<div class="text-center text-slate-500 mt-10 italic">Digite algo para buscar...</div>';
        return;
      }
      
      searchTimeout = setTimeout(() => {
        if (ws.readyState === WebSocket.OPEN) {
          document.getElementById('search-results').innerHTML = '<div class="text-center text-slate-500 mt-10">Buscando...</div>';
          ws.send(JSON.stringify({ type: 'search', query }));
        }
      }, 300); // debounce 300ms
    });

    function renderSearchResults(results) {
      const container = document.getElementById('search-results');
      if (!results || results.length === 0) {
        container.innerHTML = '<div class="text-center text-slate-500 mt-10 italic">Nenhuma música encontrada.</div>';
        return;
      }
      
      container.innerHTML = results.map(song => `
        <div class="bg-slate-800/50 border border-slate-700/50 rounded-xl p-3 flex items-center justify-between gap-3 hover:bg-slate-800 transition-colors">
          <div class="flex-1 min-w-0">
            <div class="font-bold text-white truncate text-base leading-tight">${song.title}</div>
            <div class="text-xs text-slate-400 mt-1 flex items-center gap-2">
              <span class="bg-slate-700 text-slate-300 px-1.5 py-0.5 rounded font-mono text-[9px] uppercase tracking-wider">${song.file_type}</span>
              <span class="truncate">${song.artist || 'Desconhecido'}</span>
            </div>
          </div>
          <button onclick="openModal(${song.id}, '${song.title.replace(/'/g, "\\'")}')" class="shrink-0 w-10 h-10 rounded-full bg-blue-600/20 text-blue-400 hover:bg-blue-600 hover:text-white flex items-center justify-center text-xl transition-colors">
            +
          </button>
        </div>
      `).join('');
    }

    function renderQueue(queue) {
      document.getElementById('queue-count').innerText = queue.length;
      const container = document.getElementById('queue-list');
      
      if (!queue || queue.length === 0) {
        container.innerHTML = '<div class="text-center text-slate-500 italic mt-10">A fila está vazia. Seja o primeiro!</div>';
        return;
      }
      
      container.innerHTML = queue.map((item, idx) => `
        <div class="bg-slate-800 border-l-4 ${idx === 0 ? 'border-green-500' : 'border-blue-500'} rounded-r-xl p-3 flex items-center gap-3 shadow-md">
          <div class="flex-col flex items-center justify-center w-8 shrink-0">
            <span class="text-xs text-slate-500 font-bold">#${idx + 1}</span>
            ${idx === 0 ? '<span class="text-[10px] text-green-400 animate-pulse mt-1">NEXT</span>' : ''}
          </div>
          <div class="flex-1 min-w-0">
            <div class="font-bold text-slate-200 truncate">${item.song.title}</div>
            <div class="text-sm text-slate-400 truncate mt-0.5"><span class="text-xs">🎤</span> ${item.requested_by}</div>
          </div>
        </div>
      `).join('');
    }

    // Modal & Enqueue
    function openModal(id, title) {
      selectedSongId = id;
      document.getElementById('modal-song-title').innerText = title;
      const modal = document.getElementById('singer-modal');
      const content = document.getElementById('singer-modal-content');
      const input = document.getElementById('singer-input');
      
      modal.classList.remove('hidden');
      setTimeout(() => {
        content.classList.remove('scale-95');
        content.classList.add('scale-100');
        input.focus();
      }, 10);
    }

    function closeModal() {
      const modal = document.getElementById('singer-modal');
      const content = document.getElementById('singer-modal-content');
      
      content.classList.remove('scale-100');
      content.classList.add('scale-95');
      setTimeout(() => {
        modal.classList.add('hidden');
        selectedSongId = null;
        document.getElementById('singer-input').value = '';
      }, 200);
    }

    document.getElementById('btn-enqueue').addEventListener('click', () => {
      const singer = document.getElementById('singer-input').value.trim();
      if (!singer) {
        alert('Por favor, informe seu nome!');
        return;
      }
      
      if (ws.readyState === WebSocket.OPEN && selectedSongId !== null) {
        ws.send(JSON.stringify({
          type: 'enqueue',
          song_id: selectedSongId,
          singer: singer
        }));
        closeModal();
      }
    });

    document.getElementById('singer-input').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        document.getElementById('btn-enqueue').click();
      }
    });

    // Toast Notification
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.innerText = msg;
      toast.classList.remove('translate-y-20', 'opacity-0');
      
      setTimeout(() => {
        toast.classList.add('translate-y-20', 'opacity-0');
      }, 3000);
    }

    // Init
    initWebSocket();
  </script>
</body>
</html>
